ShortDescription: Lock Windows timer to 0.5 ms, auto-purge standby memory, optimize games.
Description: |-
  StandbyAndTimer is a Windows desktop utility for gamers and power users.

  - Pins the system timer at 0.5 ms via NtSetTimerResolution for lower input latency.
  - Manual and automatic purge of the Windows standby memory list via NtSetSystemInformation.
  - Sets High CPU priority + full affinity on user-configured game processes.
  - Runs in the system tray with optional launch at Windows startup.
  - First-run wizard, in-app crash reporter, log viewer, and fullscreen game auto-detect.

  Requires Administrator privileges (declared in app.manifest). Windows 10 21H1+ or Windows 11, x64.

